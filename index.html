<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>أثير — ثيم سلة قادم قريباً</title>
<meta name="description" content="أثير — ثيم عصري وأنيق لمتاجر سلة، قادم قريباً.">
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --color-navy:#0A4D68;
    --color-navy-mid:#0D6080;
    --color-teal:#088395;
    --color-teal-light:#0AA3B8;
    --color-teal-pale:#D6F0F4;
    --font-latin:'Raleway', system-ui, -apple-system, sans-serif;
    --font-arabic:'Tajawal', 'Segoe UI', system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:var(--font-arabic);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg, #072E3E 0%, #0A4D68 60%, #088395 100%);
    color:#fff;
    text-align:center;
    padding:24px;
  }
  .wrap{max-width:560px;}
  .logo{width:72px;height:72px;margin:0 auto 32px;}
  h1{
    font-family:var(--font-latin), var(--font-arabic);
    font-weight:800;
    font-size:clamp(32px, 6vw, 48px);
    letter-spacing:.5px;
    margin-bottom:8px;
  }
  .theme-name-ar{font-size:clamp(20px,3vw,26px);font-weight:500;color:var(--color-teal-light);margin-bottom:28px;}
  p.tagline{
    font-size:18px;
    line-height:1.8;
    color:rgba(255,255,255,.88);
    margin-bottom:36px;
  }
  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 22px;
    border:1px solid rgba(255,255,255,.25);
    border-radius:999px;
    font-size:14px;
    color:rgba(255,255,255,.75);
    background:rgba(255,255,255,.06);
  }
  .badge .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--color-teal-light);
    box-shadow:0 0 0 0 rgba(10,163,184,.6);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(10,163,184,.55);}
    70%{box-shadow:0 0 0 10px rgba(10,163,184,0);}
    100%{box-shadow:0 0 0 0 rgba(10,163,184,0);}
  }
  footer{
    position:fixed;bottom:20px;left:0;right:0;
    font-size:13px;color:rgba(255,255,255,.5);
  }
  @media (prefers-color-scheme: light){
    /* الصفحة ملتزمة بخلفية داكنة دائماً — جزء من الهوية */
  }
</style>
</head>
<body>
  <div class="wrap">
    <svg class="logo" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="70" y1="32" x2="40" y2="106" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
      <line x1="70" y1="32" x2="100" y2="106" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
      <polyline points="48,74 61,74 66,66 74,82 79,66 92,74"
        stroke="#0AA3B8" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="70" cy="32" r="5" fill="#0AA3B8"/>
    </svg>
    <h1>Atheer</h1>
    <div class="theme-name-ar">أثير — ثيم سلة</div>
    <p class="tagline">
      ثيم عصري وأنيق لمتاجر سلة، مصمم بعناية للسرعة ووضوح تجربة التسوق —
      واجهة نظيفة تبرز منتجاتك بلا تشتيت.
    </p>
    <span class="badge"><span class="dot"></span> قيد التطوير — قريباً</span>
  </div>
  <footer>Ahmad Alharbi</footer>
</body>
</html>
